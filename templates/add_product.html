<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<form method="post">
    <input type="text" name="name" id="">
    <input type="number" name="price" id="">
    <input type="submit" name="" id="">

</form>


<table>
    <tr>
        <th>
            Name
        </th>
        <th>
            Price
        </th>
    </tr>

    {% for i in data %}
        <tr>
        <td>{{ i.name }}</td>
        <td>{{ i.price }}</td>
        </tr>

    {% endfor %}

</table>

</body>
</html>
